            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::boids not affected by this push — skipping deploy."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.affected.outputs.deploy == 'true'

      - name: Deploy boids
        if: steps.affected.outputs.deploy == 'true'
        # From the repo root: the Dockerfile needs the whole monorepo as its

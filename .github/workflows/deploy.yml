# Deploy on merge to main — one job per app (copy the deploy-hub job and swap
# the app name/paths/URL when adding an app).
#
# INERT UNTIL PHASE 4: every action step is gated on FLY_API_TOKEN being set
# as a repo secret (runbook G4.2). Until then the workflow runs, prints a
# notice, and exits green.
#
# The deploy-sprout* jobs carry an EXTRA gate: the repo variable SPROUT_GO_LIVE
# must be "true". FLY_API_TOKEN already exists (hub is live) but is hoe-hub
# app-scoped and the sprout Fly apps don't exist until P11, so without this gate
# a merge to main would attempt — and fail — a sprout deploy. A human flips
# SPROUT_GO_LIVE=true at go-live (sprout go-live runbook, step 4).
#
# Flow per app: is the app turbo-affected by this push? → flyctl deploy
# (a DB-backed app's fly.toml release_command runs its journal-tracked
# migrations first; Fly's health checks gate the rollout, so a failing
# /health keeps the previous healthy release serving traffic — safe because
# migrations are expand-contract, see packages/db/README.md; a DB-less app
# per ADR 0006, e.g. boids, has no release_command) → post-deploy smoke:
# /health (a real Store round-trip for a DB-backed app, an in-memory
# liveness ping for a DB-less one) + the SPA index + one hashed static
# asset, proving the artifact actually serves.
#
# Required secrets (G4.2): FLY_API_TOKEN
name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-hub:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      APP_URL: https://hoe-hub.fly.dev
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gate on deploy token (inert until Phase 4)
        id: gate
        run: |
          if [ -n "$FLY_API_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::FLY_API_TOKEN not set — deploy workflow is inert until Phase 4 (runbook G4.2)."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.gate.outputs.ready == 'true'

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.ready == 'true'
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: steps.gate.outputs.ready == 'true'

      - name: Is hub affected by this push?
        id: affected
        if: steps.gate.outputs.ready == 'true'
        env:
          TURBO_SCM_BASE: ${{ github.event.before }}
        run: |
          if pnpm exec turbo ls --affected --output=json | jq -e '.packages.items[] | select(.name == "hub")' > /dev/null; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::hub not affected by this push — skipping deploy."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.affected.outputs.deploy == 'true'

      - name: Deploy hub (release_command runs migrations)
        if: steps.affected.outputs.deploy == 'true'
        # From the repo root: the Dockerfile needs the whole monorepo as its
        # build context (turbo prune).
        run: flyctl deploy --config apps/hub/fly.toml --remote-only

      - name: Post-deploy smoke
        if: steps.affected.outputs.deploy == 'true'
        run: |
          set -euo pipefail
          echo "deep /health (real Store → Postgres round-trip)"
          curl -fsS --retry 5 --retry-delay 3 "$APP_URL/health"
          echo "SPA index"
          index=$(curl -fsS "$APP_URL/")
          echo "$index" | grep -q '<div id="root">'
          echo "one hashed static asset"
          asset=$(echo "$index" | grep -oE 'assets/[^"]+\.js' | head -1)
          test -n "$asset"
          curl -fsS "$APP_URL/$asset" > /dev/null
          echo "smoke OK"

  deploy-boids:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      APP_URL: https://hoe-boids.fly.dev
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gate on deploy token (inert until Phase 4)
        id: gate
        run: |
          if [ -n "$FLY_API_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::FLY_API_TOKEN not set — deploy workflow is inert until Phase 4 (runbook G4.2)."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.gate.outputs.ready == 'true'

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.ready == 'true'
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: steps.gate.outputs.ready == 'true'

      - name: Is boids affected by this push?
        id: affected
        if: steps.gate.outputs.ready == 'true'
        env:
          TURBO_SCM_BASE: ${{ github.event.before }}
        run: |
          if pnpm exec turbo ls --affected --output=json | jq -e '.packages.items[] | select(.name == "boids")' > /dev/null; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::boids not affected by this push — skipping deploy."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.affected.outputs.deploy == 'true'

      - name: Deploy boids
        if: steps.affected.outputs.deploy == 'true'
        # From the repo root: the Dockerfile needs the whole monorepo as its
        # build context (turbo prune).
        run: flyctl deploy --config apps/boids/fly.toml --remote-only

      - name: Post-deploy smoke
        if: steps.affected.outputs.deploy == 'true'
        run: |
          set -euo pipefail
          echo "/health (in-memory liveness ping — boids has no database, ADR 0006)"
          curl -fsS --retry 5 --retry-delay 3 "$APP_URL/health"
          echo "SPA index"
          index=$(curl -fsS "$APP_URL/")
          echo "$index" | grep -q '<div id="root">'
          echo "one hashed static asset"
          asset=$(echo "$index" | grep -oE 'assets/[^"]+\.js' | head -1)
          test -n "$asset"
          curl -fsS "$APP_URL/$asset" > /dev/null
          echo "smoke OK"

  deploy-fridge:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      APP_URL: https://hoe-fridge.fly.dev
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gate on deploy token (inert until Phase 4)
        id: gate
        run: |
          if [ -n "$FLY_API_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::FLY_API_TOKEN not set — deploy workflow is inert until Phase 4 (runbook G4.2)."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.gate.outputs.ready == 'true'

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.ready == 'true'
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: steps.gate.outputs.ready == 'true'

      - name: Is fridge affected by this push?
        id: affected
        if: steps.gate.outputs.ready == 'true'
        env:
          TURBO_SCM_BASE: ${{ github.event.before }}
        run: |
          if pnpm exec turbo ls --affected --output=json | jq -e '.packages.items[] | select(.name == "fridge")' > /dev/null; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::fridge not affected by this push — skipping deploy."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.affected.outputs.deploy == 'true'

      - name: Deploy fridge
        if: steps.affected.outputs.deploy == 'true'
        # From the repo root: the Dockerfile needs the whole monorepo as its
        # build context (turbo prune).
        run: flyctl deploy --config apps/fridge/fly.toml --remote-only

      - name: Post-deploy smoke
        if: steps.affected.outputs.deploy == 'true'
        run: |
          set -euo pipefail
          echo "/health (process liveness only — fridge has no database yet, ADR 0008)"
          curl -fsS --retry 5 --retry-delay 3 "$APP_URL/health"
          echo "SPA index"
          index=$(curl -fsS "$APP_URL/")
          echo "$index" | grep -q '<div id="root">'
          echo "one hashed static asset"
          asset=$(echo "$index" | grep -oE 'assets/[^"]+\.js' | head -1)
          test -n "$asset"
          curl -fsS "$APP_URL/$asset" > /dev/null
          echo "smoke OK"

  deploy-wotd:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      APP_URL: https://hoe-wotd.fly.dev
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gate on deploy token (inert until Phase 4)
        id: gate
        run: |
          if [ -n "$FLY_API_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::FLY_API_TOKEN not set — deploy workflow is inert until Phase 4 (runbook G4.2)."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.gate.outputs.ready == 'true'

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.ready == 'true'
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: steps.gate.outputs.ready == 'true'

      - name: Is wotd affected by this push?
        id: affected
        if: steps.gate.outputs.ready == 'true'
        env:
          TURBO_SCM_BASE: ${{ github.event.before }}
        run: |
          if pnpm exec turbo ls --affected --output=json | jq -e '.packages.items[] | select(.name == "wotd")' > /dev/null; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::wotd not affected by this push — skipping deploy."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.affected.outputs.deploy == 'true'

      - name: Deploy wotd (release_command runs migrations)
        if: steps.affected.outputs.deploy == 'true'
        # From the repo root: the Dockerfile needs the whole monorepo as its
        # build context (turbo prune).
        run: flyctl deploy --config apps/wotd/fly.toml --remote-only

      - name: Post-deploy smoke
        if: steps.affected.outputs.deploy == 'true'
        run: |
          set -euo pipefail
          echo "deep /health (real Store → Postgres round-trip)"
          curl -fsS --retry 5 --retry-delay 3 "$APP_URL/health"
          echo "SPA index"
          index=$(curl -fsS "$APP_URL/")
          echo "$index" | grep -q '<div id="root">'
          echo "one hashed static asset"
          asset=$(echo "$index" | grep -oE 'assets/[^"]+\.js' | head -1)
          test -n "$asset"
          curl -fsS "$APP_URL/$asset" > /dev/null
          echo "smoke OK"

  # sprout — database-backed web app (plan 0004). Deploys the `web` + `worker`
  # process groups from one image; release_command runs migrations first.
  #
  # Deploy ordering vs sprout-pipeline: INDEPENDENT (plan §9.1's second option).
  # sprout's /health is a deep Store→Postgres round-trip that does NOT touch the
  # pipeline, and chat fails closed if the pipeline is momentarily unreachable
  # (plan §12), so the web smoke never depends on the pipeline being up. Each
  # app therefore keeps its own independent affected-gated job (matching every
  # other app here) — no cross-job `needs`.
  #
  # NOTE (P11, plan §9.3): requires an ORG-scoped FLY_API_TOKEN — the existing
  # hoe-hub app-scoped token cannot deploy hoe-sprout.
  deploy-sprout:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      APP_URL: https://hoe-sprout.fly.dev
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gate on go-live (P11) + deploy token
        id: gate
        env:
          GO_LIVE: ${{ vars.SPROUT_GO_LIVE }}
        run: |
          if [ "$GO_LIVE" != "true" ]; then
            echo "::notice::sprout not live yet — set repo variable SPROUT_GO_LIVE=true at go-live (P11, runbook step 4)."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          elif [ -n "$FLY_API_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::FLY_API_TOKEN not set — deploy workflow is inert until Phase 4 (runbook G4.2)."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.gate.outputs.ready == 'true'

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.ready == 'true'
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: steps.gate.outputs.ready == 'true'

      - name: Is sprout affected by this push?
        id: affected
        if: steps.gate.outputs.ready == 'true'
        env:
          TURBO_SCM_BASE: ${{ github.event.before }}
        run: |
          if pnpm exec turbo ls --affected --output=json | jq -e '.packages.items[] | select(.name == "sprout")' > /dev/null; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::sprout not affected by this push — skipping deploy."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.affected.outputs.deploy == 'true'

      - name: Deploy sprout (release_command runs migrations)
        if: steps.affected.outputs.deploy == 'true'
        # From the repo root: the Dockerfile needs the whole monorepo as its
        # build context (turbo prune).
        run: flyctl deploy --config apps/sprout/fly.toml --remote-only

      - name: Post-deploy smoke
        if: steps.affected.outputs.deploy == 'true'
        run: |
          set -euo pipefail
          echo "deep /health (real Store → Postgres round-trip)"
          curl -fsS --retry 5 --retry-delay 3 "$APP_URL/health"
          echo "SPA index"
          index=$(curl -fsS "$APP_URL/")
          echo "$index" | grep -q '<div id="root">'
          echo "one hashed static asset"
          asset=$(echo "$index" | grep -oE 'assets/[^"]+\.js' | head -1)
          test -n "$asset"
          curl -fsS "$APP_URL/$asset" > /dev/null
          echo "smoke OK"

  # sprout-pipeline — headless, PRIVATE safety service (plan 0004 §5.5 / §9.3).
  # No public hostname, so there is NO public /health to curl. The deploy step
  # is itself the smoke: the machine only becomes healthy if index.ts boots, and
  # index.ts fails closed at boot without OPENROUTER_API_KEY (client
  # construction) and PIPELINE_API_KEY (prod guard) — a bad release aborts the
  # rollout. (node:22-slim ships no curl, so an in-container HTTP probe isn't
  # available either; `flyctl status` prints the machine health for the log.)
  #
  # NOTE (P11): ORG-scoped FLY_API_TOKEN required (same as sprout). Do NOT add a
  # Cloudflare CNAME/cert for this app — it stays private (.flycast).
  deploy-sprout-pipeline:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gate on go-live (P11) + deploy token
        id: gate
        env:
          GO_LIVE: ${{ vars.SPROUT_GO_LIVE }}
        run: |
          if [ "$GO_LIVE" != "true" ]; then
            echo "::notice::sprout not live yet — set repo variable SPROUT_GO_LIVE=true at go-live (P11, runbook step 4)."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          elif [ -n "$FLY_API_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::FLY_API_TOKEN not set — deploy workflow is inert until Phase 4 (runbook G4.2)."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.gate.outputs.ready == 'true'

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.ready == 'true'
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: steps.gate.outputs.ready == 'true'

      - name: Is sprout-pipeline affected by this push?
        id: affected
        if: steps.gate.outputs.ready == 'true'
        env:
          TURBO_SCM_BASE: ${{ github.event.before }}
        run: |
          if pnpm exec turbo ls --affected --output=json | jq -e '.packages.items[] | select(.name == "sprout-pipeline")' > /dev/null; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::sprout-pipeline not affected by this push — skipping deploy."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.affected.outputs.deploy == 'true'

      - name: Deploy sprout-pipeline (no release_command — stateless)
        if: steps.affected.outputs.deploy == 'true'
        # From the repo root: the Dockerfile needs the whole monorepo as its
        # build context (turbo prune).
        run: flyctl deploy --config apps/sprout-pipeline/fly.toml --remote-only

      - name: Post-deploy status (no public smoke — private .flycast service)
        if: steps.affected.outputs.deploy == 'true'
        run: |
          set -euo pipefail
          echo "sprout-pipeline is private (no public hostname) — the deploy above"
          echo "gates the rollout on the machine booting healthy. Machine status:"
          flyctl status --config apps/sprout-pipeline/fly.toml

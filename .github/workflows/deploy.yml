          set -euo pipefail
          echo "/health (in-memory liveness ping — boids has no database, ADR 0006)"
          curl -fsS --retry 5 --retry-delay 3 "$APP_URL/health"
          echo "SPA index"
          index=$(curl -fsS "$APP_URL/")

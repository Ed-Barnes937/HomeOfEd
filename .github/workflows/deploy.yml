          else
            echo "::notice::FLY_API_TOKEN not set — deploy workflow is inert until Phase 4 (runbook G4.2)."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.gate.outputs.ready == 'true'

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.ready == 'true'
        with:

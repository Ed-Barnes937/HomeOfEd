      - name: Post-deploy smoke
        if: steps.affected.outputs.deploy == 'true'
        run: |
          set -euo pipefail
          echo "/health (process liveness only — fridge has no database yet, ADR 0008)"
          curl -fsS --retry 5 --retry-delay 3 "$APP_URL/health"
          echo "SPA index"
          index=$(curl -fsS "$APP_URL/")
          echo "$index" | grep -q '<div id="root">'
          echo "one hashed static asset"
          asset=$(echo "$index" | grep -oE 'assets/[^"]+\.js' | head -1)
          test -n "$asset"
          curl -fsS "$APP_URL/$asset" > /dev/null
          echo "smoke OK"

  deploy-wotd:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

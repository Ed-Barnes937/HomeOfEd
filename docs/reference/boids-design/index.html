<!DOCTYPE html>
<html lang="en" data-theme="neon">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boids Simulator — design reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Full-bleed flocking backdrop. In production this is a live simulation;
       here it is painted as one static reference frame by boids.js -->
  <canvas class="sim-canvas" id="sim"></canvas>

  <!-- Collapsed affordance (hidden while the panel is open) -->
  <button class="fab" id="fab" aria-label="Open settings" hidden>
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <path d="M3 5.5h6M13 5.5h2M3 12.5h2M9 12.5h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <circle cx="11" cy="5.5" r="2" stroke="currentColor" stroke-width="1.4"/>
      <circle cx="7" cy="12.5" r="2" stroke="currentColor" stroke-width="1.4"/>
    </svg>
  </button>

  <!-- Settings dialog -->
  <aside class="panel" id="panel" role="dialog" aria-label="Simulation settings">
    <div class="panel__head">
      <div class="panel__title">
        <span class="panel__wordmark">boids</span>
        <span class="panel__tag">flock study</span>
      </div>
      <button class="icon-btn" id="collapse" aria-label="Collapse settings">
        <svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 7h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>

    <!-- THEME -->
    <div class="group-label">theme</div>
    <div class="theme-grid" id="themes"><!-- chips injected by boids.js --></div>

    <!-- SHAPE -->
    <div class="group-label" style="margin-top:22px">shape</div>
    <div class="seg" id="shapes">
      <button class="seg__btn" data-shape="triangle" aria-pressed="true" aria-label="Triangle boids">
        <svg width="17" height="17" viewBox="0 0 17 17"><path d="M14 8.5L4.5 13l2.4-4.5L4.5 4z" fill="currentColor"/></svg>
      </button>
      <button class="seg__btn" data-shape="dot" aria-pressed="false" aria-label="Dot boids">
        <svg width="17" height="17" viewBox="0 0 17 17"><circle cx="8.5" cy="8.5" r="3.2" fill="currentColor"/></svg>
      </button>
      <button class="seg__btn" data-shape="line" aria-pressed="false" aria-label="Line boids">
        <svg width="17" height="17" viewBox="0 0 17 17"><path d="M3 8.5h10" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><circle cx="13" cy="8.5" r="1.8" fill="currentColor"/></svg>
      </button>
    </div>

    <div class="hairline"></div>

    <!-- BEHAVIOUR SLIDERS (injected by boids.js) -->
    <div id="sliders"></div>
  </aside>

  <script src="boids.js"></script>
</body>
</html>

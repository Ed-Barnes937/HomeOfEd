# inksplat — a stateless leaf app (ADR 0008). Deploy FROM THE REPO ROOT so the
# docker build context contains the whole monorepo:
#
#   fly deploy -c apps/inksplat/fly.toml
#
# Per-app values when copying this file: `app` (unique per Fly app), the
# DATABASE_URL secret (its own database in the shared Postgres cluster — set
# via `fly postgres attach`, never here), and nothing else in the usual case.
# inksplat has no database, so it has neither a release_command nor a
# DATABASE_URL secret — see ADR 0008.
app = 'hoe-inksplat'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # Calm doodling toy — accepts a cold-start pause after idle (flip to 1 if that annoys).
  min_machines_running = 0

  [[http_service.checks]]
    # Liveness only: no Store to round-trip — inksplat has no database
    # (ADR 0008); everything the user draws stays in the browser.
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'

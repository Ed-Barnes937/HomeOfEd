# starter — the stateless reference app (ADR 0007). It is NOT deployed; this is
# a template. Copy to apps/<name>, set `app` to a unique Fly app name, and follow
# the "adding an app" checklist in the root CLAUDE.md.
#
# A stateless app (ADR 0008) has NO release_command (no migrations) and a shallow
# /health. If the app gains a database, add both back — see apps/hub/fly.toml for
# the release_command and the deep-health check.
app = 'hoe-wotd'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # Scale to zero when idle — a copied app raises this if it must stay warm.
  min_machines_running = 0

  [[http_service.checks]]
    # Shallow health: liveness only — a stateless app has no Store to round-trip
    # (ADR 0008). A DB-backed app injects a real round-trip via createAppServer.
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
